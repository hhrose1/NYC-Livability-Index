    <!-- Main Content -->
    <div class="content-wrapper">
        <div class="hero-card">
            <h1 class="hero-headline">Find your corner of the city.</h1>
            
            <div class="search-container">
                <div class="input-group">
                    <label class="input-label">Monthly Budget</label>
                    <input type="text" class="budget-input" placeholder="$2,500" id="budgetInput">
                </div>

                <div class="input-group">
                    <label class="input-label">What Matters Most</label>
                    <div class="priority-chips">
                        <div class="chip" data-priority="safety">
                            <span class="chip-icon">🛡️</span>
                            <span>Safety</span>
                        </div>
                        <div class="chip" data-priority="transit">
                            <span class="chip-icon">🚇</span>
                            <span>Transit</span>
                        </div>
                        <div class="chip" data-priority="nightlife">
                            <span class="chip-icon">🌃</span>
                            <span>Nightlife</span>
                        </div>
                        <div class="chip" data-priority="walkability">
                            <span class="chip-icon">🚶</span>
                            <span>Walkability</span>
                        </div>
                        <div class="chip" data-priority="parks">
                            <span class="chip-icon">🌳</span>
                            <span>Parks</span>
                        </div>
                    </div>
                </div>

                <button class="search-button" id="searchBtn">Search Neighborhoods</button>
            </div>

            <div class="tool-cards">
                <a href="transportation.html" class="tool-card mta">
                    <span class="tool-icon">🚇</span>
                    <div class="tool-title">Subway Safety</div>
                    <div class="tool-subtitle">Station Ratings</div>
                </a>
                <a href="apartments.html#hpd" class="tool-card taxi">
                    <span class="tool-icon">⚠️</span>
                    <div class="tool-title">HPD Violations</div>
                    <div class="tool-subtitle">Building Reports</div>
                </a>
                <a href="livability.html" class="tool-card brick">
                    <span class="tool-icon">🗺️</span>
                    <div class="tool-title">Interactive Map</div>
                    <div class="tool-subtitle">Explore NYC</div>
                </a>
            </div>
        </div>
    </div>

    <script>
        // Priority chip selection
        const chips = document.querySelectorAll('.chip');
        const selectedPriorities = new Set();

        chips.forEach(chip => {
            chip.addEventListener('click', () => {
                const priority = chip.dataset.priority;
                
                if (chip.classList.contains('active')) {
                    chip.classList.remove('active');
                    selectedPriorities.delete(priority);
                } else {
                    chip.classList.add('active');
                    selectedPriorities.add(priority);
                }
            });
        });

        // Search button - goes to apartments page with selected values
        document.getElementById('searchBtn').addEventListener('click', () => {
            const budgetRaw = document.getElementById('budgetInput').value.replace(/[^0-9]/g, '');
            const priorities = Array.from(selectedPriorities);
            
            // Store in sessionStorage
            if (budgetRaw) {
                sessionStorage.setItem('quickSearchBudget', budgetRaw);
            }
            if (priorities.length > 0) {
                // Take first priority as the main one
                sessionStorage.setItem('quickSearchPriority', priorities[0]);
            }
            
            // Navigate to apartments page
            window.location.href = 'apartments.html';
        });

        // Budget input formatting
        const budgetInput = document.getElementById('budgetInput');
        
        budgetInput.addEventListener('blur', (e) => {
            let value = e.target.value.replace(/[^0-9]/g, '');
            if (value) {
                e.target.value = '$' + parseInt(value).toLocaleString();
            }
        });

        budgetInput.addEventListener('focus', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
        });

        // Enter key triggers search
        budgetInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('searchBtn').click();
            }
        });
    </script>
